name: Research EAP extraction

on:
  push:
    branches:
      - research/eap-trigger-audit-2026-07
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install research dependencies
        run: |
          python -m pip install beautifulsoup4 playwright pypdf
          python -m playwright install --with-deps chromium
      - name: Extract official EAP documents
        run: python scripts/research_extract_eap.py
      - name: Commit research outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research_eap_extract
          if git diff --cached --quiet; then
            echo "No research output changes."
          else
            git commit -m "Extract official EAP research data"
            git push
          fi
