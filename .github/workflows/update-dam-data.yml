name: Update Queensland dam data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: qld-dam-data-and-pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install collector dependencies
        run: python -m pip install --requirement scripts/requirements.txt

      - name: Collect live dam and gauge data
        run: python scripts/update_dam_data.py --history-days 400

      - name: Validate generated dashboard data
        run: python scripts/validate_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data config/dams.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Queensland dam data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  required-feed-health:
    needs: [collect, deploy]
    if: always() && needs.collect.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest committed data
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Report required current-feed failures
        run: python scripts/check_provider_health.py
