name: Temporary EAP research extraction

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/temporary-eap-research.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: temporary-eap-research
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4
        with:
          ref: research/eap-trigger-audit-2026-07
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install extraction dependencies
        run: python -m pip install curl-cffi
      - name: Extract EAP text in parallel
        run: timeout 18m python scripts/research_extract_eap_jina_parallel.py
        continue-on-error: true
      - name: Upload research outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eap-research-output
          path: research_eap_jina_parallel
          if-no-files-found: warn
