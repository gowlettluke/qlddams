name: Temporary EAP research extraction

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/temporary-eap-research.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4
        with:
          ref: research/eap-trigger-audit-2026-07
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install extraction dependencies
        run: python -m pip install beautifulsoup4 curl-cffi pypdf
      - name: Extract official EAP PDFs
        run: python scripts/research_extract_eap_curl.py
        continue-on-error: true
      - name: Extract EAP text through public reader fallback
        run: python scripts/research_extract_eap_jina.py
        continue-on-error: true
      - name: Upload research outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eap-research-output
          path: |
            research_eap_curl
            research_eap_jina
          if-no-files-found: warn
      - name: Commit research text outputs
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research_eap_curl research_eap_jina
          if git diff --cached --quiet; then
            echo "No output changes"
          else
            git commit -m "Extract official EAP text for audit"
            git push origin HEAD:research/eap-trigger-audit-2026-07
          fi
