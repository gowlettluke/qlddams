name: Audit Queensland dam EAPs

on:
  push:
    branches: [main]
    paths:
      - "config/eap_*.json"
      - "scripts/update_eap_data.py"
      - "scripts/assess_eap_status.py"
      - ".github/workflows/update-eap-data.yml"
  workflow_dispatch:
    inputs:
      dam_id:
        description: "Optional single dam id (leave blank to audit all dams)"
        required: false
        type: string
  schedule:
    - cron: "41 3 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: qld-dam-data-and-pages
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --requirement scripts/requirements.txt

      - name: Audit official EAP documents
        shell: bash
        run: |
          if [ -n "${{ inputs.dam_id }}" ]; then
            python scripts/update_eap_data.py --dam "${{ inputs.dam_id }}"
          else
            python scripts/update_eap_data.py
          fi

      - name: Recalculate indicative flood-trigger levels
        run: python scripts/assess_eap_status.py

      - name: Validate dashboard data
        run: python scripts/validate_data.py

      - name: Commit EAP audit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/eap_documents.json data/eap_status.json
          if git diff --cached --quiet; then
            echo "No EAP changes to commit."
          else
            git commit -m "Audit Queensland dam EAP documents"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
